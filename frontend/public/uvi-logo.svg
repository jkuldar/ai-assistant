<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="clip">
      <circle cx="100" cy="100" r="99"/>
    </clipPath>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#02091a"/>
      <stop offset="70%" stop-color="#061324"/>
      <stop offset="100%" stop-color="#09192f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#sky)"/>

  <g clip-path="url(#clip)">

    <!-- Aurora borealis — layered horizontal bands -->
    <!-- Diffuse glow layer -->
    <path d="M-10 110 Q50 70 100 96 Q150 122 210 82"
          stroke="#00b48a" stroke-width="32" fill="none" opacity="0.14" stroke-linecap="round"/>
    <!-- Core band 1 -->
    <path d="M-10 106 Q48 66 98 92 Q148 118 208 78"
          stroke="#00c9a7" stroke-width="18" fill="none" opacity="0.30" stroke-linecap="round"/>
    <!-- Core band 2 -->
    <path d="M-10 101 Q46 62 96 88 Q146 114 206 74"
          stroke="#1dd1a1" stroke-width="10" fill="none" opacity="0.48" stroke-linecap="round"/>
    <!-- Bright edge -->
    <path d="M-10 97  Q44 59 94 85 Q144 111 204 71"
          stroke="#55efc4" stroke-width="4.5" fill="none" opacity="0.58" stroke-linecap="round"/>
    <!-- Faint upper shimmer -->
    <path d="M-10 91  Q42 54 92 80 Q142 106 202 66"
          stroke="#81ecec" stroke-width="2.5" fill="none" opacity="0.30" stroke-linecap="round"/>

    <!-- Mountain / horizon silhouette -->
    <path d="M0 174 L25 144 L48 158 L68 130 L88 148 L106 122
             L124 142 L148 124 L170 140 L192 128 L200 134
             L200 202 L0 202 Z"
          fill="#020911"/>

    <!-- Stars — 4-pointed (not dots) -->
    <!-- Large star left -->
    <path d="M34 40 L36.4 32 L38.8 40 L46 42.5 L38.8 45 L36.4 53 L34 45 L26.8 42.5 Z"
          fill="white" opacity="0.90"/>
    <!-- Large star right -->
    <path d="M158 34 L160.4 26 L162.8 34 L170 36.5 L162.8 39 L160.4 47 L158 39 L150.8 36.5 Z"
          fill="white" opacity="0.85"/>
    <!-- Medium star top-centre -->
    <path d="M99 17 L100.7 11 L102.4 17 L108 18.8 L102.4 20.6 L100.7 26.5 L99 20.6 L93.4 18.8 Z"
          fill="white" opacity="0.78"/>
    <!-- Small accent star, upper-left -->
    <path d="M67 27 L68.3 23 L69.6 27 L73.5 28.3 L69.6 29.6 L68.3 33.5 L67 29.6 L63.1 28.3 Z"
          fill="white" opacity="0.62"/>
    <!-- Small accent star, upper-right -->
    <path d="M143 50 L144.3 46 L145.6 50 L149.5 51.3 L145.6 52.6 L144.3 56.5 L143 52.6 L139.1 51.3 Z"
          fill="white" opacity="0.58"/>

    <!-- üVi brand mark: dot + V -->
    <!-- Dot (the ü umlaut, centred above V) -->
    <circle cx="100" cy="60" r="5.8" fill="white"/>
    <!-- V — two strokes meeting at bottom tip -->
    <line x1="77"  y1="74" x2="100" y2="118"
          stroke="white" stroke-width="7.5" stroke-linecap="round"/>
    <line x1="123" y1="74" x2="100" y2="118"
          stroke="white" stroke-width="7.5" stroke-linecap="round"/>

  </g>

  <!-- Subtle rim -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
</svg>


  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#sky-grad)"/>

  <!-- Aurora waves -->
  <g clip-path="url(#circle-clip)">
    <path d="M-10 116 Q44 68 100 100 Q156 132 210 84"
          stroke="#16c4aa" stroke-width="16" fill="none" opacity="0.42" stroke-linecap="round"/>
    <path d="M-10 130 Q50 88 104 116 Q158 144 210 104"
          stroke="#2addc2" stroke-width="10" fill="none" opacity="0.52" stroke-linecap="round"/>
    <path d="M-10 142 Q56 110 110 132 Q164 154 210 120"
          stroke="#50ecd6" stroke-width="6" fill="none" opacity="0.32" stroke-linecap="round"/>

    <!-- Hills / terrain at the bottom -->
    <path d="M0 160 Q40 132 70 146 Q100 160 130 142 Q162 126 200 138 L200 202 L0 202 Z"
          fill="#030c18" opacity="0.96"/>

    <!-- Person silhouette – arms raised in a soft V -->
    <!-- Head -->
    <circle cx="100" cy="74" r="7.5" fill="white" opacity="0.96"/>
    <!-- Body -->
    <line x1="100" y1="81.5" x2="100" y2="108" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.96"/>
    <!-- Arms raised at ~45° -->
    <line x1="100" y1="90" x2="84" y2="78" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.96"/>
    <line x1="100" y1="90" x2="116" y2="78" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.96"/>
    <!-- Legs -->
    <line x1="100" y1="108" x2="91"  y2="126" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.96"/>
    <line x1="100" y1="108" x2="109" y2="126" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.96"/>

    <!-- Stars -->
    <circle cx="36"  cy="40"  r="2.4" fill="white" opacity="0.80"/>
    <circle cx="62"  cy="24"  r="1.8" fill="white" opacity="0.70"/>
    <circle cx="136" cy="30"  r="2.6" fill="white" opacity="0.85"/>
    <circle cx="160" cy="54"  r="1.6" fill="white" opacity="0.70"/>
    <circle cx="26"  cy="72"  r="1.4" fill="white" opacity="0.60"/>
    <circle cx="170" cy="36"  r="2.2" fill="white" opacity="0.75"/>
    <circle cx="148" cy="16"  r="1.6" fill="white" opacity="0.65"/>
    <!-- 4-point sparkle top-right -->
    <path d="M176 28 L178 22 L180 28 L186 30 L180 32 L178 38 L176 32 L170 30 Z"
          fill="white" opacity="0.60"/>
  </g>

  <!-- Subtle border ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
</svg>
